<html>
    <script>  
        function validateform(){  
        var username=document.register.UserName.value;  
        var userid=document.register.UserId.value; 
        var userpassword=document.register.UserPassword.value;      
        var userpasswordr=document.register.UserPasswordr.value;
        var usermobile=document.register.UserMobile.value;
        var useremail=document.register.UserEmail.value;
        var mailformat = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
        if (usermobile==null || usermobile=="" || username==null || username=="" || userid==null || userid=="" || userpassword==null || userpassword==""){  
          alert("Some mandatory fields are blank, Please Check");  
          return false;  
        }
        else if (userpassword!=userpasswordr){
            alert("Passwords donot match");
            return false;
        }
        else if (userpassword.length<6){
            alert("Password length should be more than or equal to 6");
            return false;
        }
        else if(useremail.match(mailformat))
        {
        return true;
        }
        else
        {
        alert("You have entered an invalid email address!");
        document.register.UserEmail.focus();
        return false;
        }




        } 
    </script>
<body>
    <nav>
        <input type="checkbox" id="check">
        <label for="check" class="checkbtn">
            <i class="fas fa-bars"></i>
        </label>
        <label class="logo">Omomo</label>
        <ul>
            <li><a class="active" href="#">Order-Momo</a></li>
            <li><a href="#">Quickly-Order-Momo</a></li>
            <li><a href="/register">Register</a></li>
        </ul>
    </nav>
    <br><br>
    <section>
    <center>
<form name="register" action="/register" method = "POST" onsubmit="validateform()" >
    <table>
        <tr>
        <td>User Name </td><td><input type = "text" name = "UserName" /></td>
        </tr>
        <tr>
        <td>Login Id </td><td><input type = "text" name = "UserId" /></td>
        </tr>
        <tr>
        <td>Password </td><td><input type = "password" name = "UserPassword" /></td>
        </tr>
        <tr>
        <td>Re Enter Password </td><td><input type = "password" name = "UserPasswordr" /></td>
        </tr>
        <tr>
        <td>User Email </td><td><input type = "integer" name = "UserEmail" /></td>
        </tr>
        <tr>
        <td>User Mobile</td><td><input type = "text" name = "UserMobile" /></td>
        </tr>
        <tr>
        <td>User Address</td><td><input type = "textarea" name = "UserAddress" /></td>
        </tr>
        <tr>
        <td><input type = "submit" value = "Submit" /></td>
        </tr>
    </table>
</form>
</center>
</section>
</body>
</html>
